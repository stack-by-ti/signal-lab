server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: signal-lab
    static_configs:
      - targets:
          - localhost
        labels:
          job: signal-lab
          __path__: /app/logs/app.log

    pipeline_stages:
      - json:
          expressions:
            level: level
            scenario: scenario
            status: status

      - labels:
          level:
          scenario:
          status:
